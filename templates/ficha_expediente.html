<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha Jurídica</title>
    <style>
        body { background: #0d0d0d; color: #e0e0e0; font-family: sans-serif; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .monto { color: #28a745; font-size: 1.8rem; font-weight: bold; float: right; }
        .dato { background: #222; padding: 15px; margin: 10px 0; border-left: 4px solid #007bff; }
        .label { color: #007bff; font-size: 0.7rem; text-transform: uppercase; }
        .btn-abrir { display: block; background: #007bff; color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <span class="monto">$ {{ info.monto_juicio }}</span>
        <h1>{{ info.caratula_full }}</h1>
        <p>Expediente N° {{ info.nro_expte }}</p>

        <div class="dato">
            <div class="label">Juzgado</div>
            <div>{{ info.juzgado }}</div>
        </div>
        <div class="dato">
            <div class="label">Estado Procesal</div>
            <div style="color: #ffc107;">{{ info.estado_procesal }}</div>
        </div>

        <a href="/visor/{{ info.nombre_carpeta }}" class="btn-abrir">📖 ABRIR LIBRO DIGITAL</a>
        <br>
        <a href="/" style="color:#555; text-decoration:none;">← Volver al listado</a>
    </div>
</body>
</html>
